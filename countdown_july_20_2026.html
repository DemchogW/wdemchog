<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обратный отсчёт до 20 июля 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .cw { text-align: center; width: 100%; max-width: 520px; }
    .cw-label { font-size: 13px; color: #888780; margin: 0 0 6px; letter-spacing: 0.04em; }
    .cw-date { font-size: 15px; font-weight: 500; color: #1a1a1a; margin: 0 0 2.5rem; }
    .cw-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 0 auto 2rem; }
    .cw-block { background: #f1efe8; border-radius: 12px; padding: 1.25rem 0.5rem 1rem; }
    .cw-num { font-size: 42px; font-weight: 500; color: #1a1a1a; line-height: 1; margin: 0 0 8px; font-variant-numeric: tabular-nums; }
    .cw-unit { font-size: 12px; color: #888780; margin: 0; }
    .cw-progress-bg { height: 4px; background: #f1efe8; border-radius: 2px; overflow: hidden; }
    .cw-progress-fill { height: 100%; background: #378ADD; border-radius: 2px; transition: width 1s linear; }
    .cw-progress-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: #888780; }
  </style>
</head>
<body>
  <div class="cw">
    <p class="cw-label">обратный отсчёт до</p>
    <p class="cw-date">20 июля 2026</p>

    <div class="cw-grid">
      <div class="cw-block">
        <p class="cw-num" id="cd-days">--</p>
        <p class="cw-unit">дней</p>
      </div>
      <div class="cw-block">
        <p class="cw-num" id="cd-hours">--</p>
        <p class="cw-unit">часов</p>
      </div>
      <div class="cw-block">
        <p class="cw-num" id="cd-mins">--</p>
        <p class="cw-unit">минут</p>
      </div>
      <div class="cw-block">
        <p class="cw-num" id="cd-secs">--</p>
        <p class="cw-unit">секунд</p>
      </div>
    </div>

    <div>
      <div class="cw-progress-bg">
        <div class="cw-progress-fill" id="cd-bar" style="width:0%"></div>
      </div>
      <div class="cw-progress-labels">
        <span>1 апреля 2026</span>
        <span id="cd-pct">0% пройдено</span>
        <span>20 июля 2026</span>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const target = new Date('2026-07-20T00:00:00');
      const start  = new Date('2026-04-01T00:00:00');
      const totalMs = target - start;

      function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

      function tick() {
        const now  = new Date();
        const diff = target - now;

        if (diff <= 0) {
          ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => document.getElementById(id).textContent = '00');
          document.getElementById('cd-bar').style.width = '100%';
          document.getElementById('cd-pct').textContent = '100% пройдено';
          return;
        }

        document.getElementById('cd-days').textContent  = pad(diff / 86400000);
        document.getElementById('cd-hours').textContent = pad((diff % 86400000) / 3600000);
        document.getElementById('cd-mins').textContent  = pad((diff % 3600000) / 60000);
        document.getElementById('cd-secs').textContent  = pad((diff % 60000) / 1000);

        const pct = Math.min(100, Math.max(0, ((now - start) / totalMs) * 100));
        document.getElementById('cd-bar').style.width = pct.toFixed(1) + '%';
        document.getElementById('cd-pct').textContent = pct.toFixed(1) + '% пройдено';
      }

      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
