<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown to 20 July 2026</title>
  <style>
    :root {
      --bg: #0f0f12;
      --card: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.72);
      --border: rgba(255,255,255,0.14);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Inter, Arial, sans-serif;
      background: transparent;
      color: var(--text);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .widget {
      width: 100%;
      max-width: 760px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .title {
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .date {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .cell {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px 12px;
      text-align: center;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .num {
      font-size: 38px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
    }
    .label {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .footer {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .date { font-size: 22px; }
      .num { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="title">Обратный отсчёт</div>
    <div class="date">До 20 июля 2026</div>
    <div class="grid">
      <div class="cell"><div class="num" id="days">0</div><div class="label">Дней</div></div>
      <div class="cell"><div class="num" id="hours">0</div><div class="label">Часов</div></div>
      <div class="cell"><div class="num" id="minutes">0</div><div class="label">Минут</div></div>
      <div class="cell"><div class="num" id="seconds">0</div><div class="label">Секунд</div></div>
    </div>
    <div class="footer" id="footer">Часовой пояс: Europe/Amsterdam</div>
  </div>

  <script>
    const target = new Date('2026-07-20T00:00:00+02:00').getTime();
    const elDays = document.getElementById('days');
    const elHours = document.getElementById('hours');
    const elMinutes = document.getElementById('minutes');
    const elSeconds = document.getElementById('seconds');
    const footer = document.getElementById('footer');

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateCountdown() {
      const now = Date.now();
      const diff = target - now;

      if (diff <= 0) {
        elDays.textContent = '0';
        elHours.textContent = '00';
        elMinutes.textContent = '00';
        elSeconds.textContent = '00';
        footer.textContent = 'Дата наступила';
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      elDays.textContent = days;
      elHours.textContent = pad(hours);
      elMinutes.textContent = pad(minutes);
      elSeconds.textContent = pad(seconds);
      footer.textContent = 'Часовой пояс цели: Europe/Amsterdam';
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
